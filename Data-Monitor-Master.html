<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔍 Wings Fly — Data Monitor</title>
<style>
  :root{--bg:#0a0e27;--bg2:#111630;--bg3:#161c3a;--cyan:#00d9ff;--green:#00c853;--red:#f44336;--yellow:#ff9800;--purple:#b537f2;--text:#c8d0f0;--dim:#6e8caa;--border:rgba(0,217,255,0.15);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',monospace;font-size:14px;padding:20px;}
  h1{background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;margin-bottom:20px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  @media(max-width:800px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .card h3{font-size:15px;margin-bottom:12px;color:var(--cyan);}
  .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .label{color:var(--dim);font-size:13px;}
  .val{font-weight:700;font-size:14px;}
  .ok{color:var(--green);}
  .warn{color:var(--yellow);}
  .err{color:var(--red);}
  .match{background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.2);}
  .mismatch{background:rgba(244,67,54,0.08);border:1px solid rgba(244,67,54,0.3);}
  .full{grid-column:1/-1;}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
  th{background:var(--bg3);color:var(--dim);padding:8px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
  td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.04);}
  tr:hover td{background:rgba(0,217,255,0.04);}
  .btn{background:linear-gradient(135deg,var(--cyan),#0099cc);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;margin:4px;}
  .btn:hover{opacity:0.9;}
  .btn-red{background:linear-gradient(135deg,var(--red),#cc0000);}
  .status{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;}
  .s-ok{background:rgba(0,200,83,0.15);color:var(--green);border:1px solid rgba(0,200,83,0.3);}
  .s-warn{background:rgba(255,152,0,0.15);color:var(--yellow);border:1px solid rgba(255,152,0,0.3);}
  .s-err{background:rgba(244,67,54,0.15);color:var(--red);border:1px solid rgba(244,67,54,0.3);}
  #log{background:#000;color:#0f0;font-family:monospace;font-size:12px;padding:12px;border-radius:8px;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:12px;}
  .toolbar{margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .hidden{display:none;}
  .dim{color:var(--dim);font-size:13px;}
  code{background:#000;color:#0f0;padding:2px 6px;border-radius:4px;font-size:11px;}
  #pasteSection{background:var(--bg3);border:1px dashed rgba(0,217,255,0.3);border-radius:10px;padding:14px;margin-top:10px;}
  #pasteSection textarea{width:100%;height:80px;background:#000;color:#0f0;border:1px solid rgba(0,217,255,0.2);border-radius:6px;font-family:monospace;font-size:11px;padding:8px;resize:vertical;}
  #pasteSection label{color:var(--cyan);font-size:12px;font-weight:700;display:block;margin-bottom:6px;}
  .btn-sm{padding:6px 12px;font-size:12px;}
</style>
</head>
<body>

<h1>🔍 Wings Fly — Data Monitor</h1>

<div class="toolbar">
  <button class="btn" onclick="runFullCheck()">🔄 Refresh All</button>
  <button class="btn" onclick="runDeepScan()">🔍 Deep Scan (Cloud)</button>
  <button class="btn" onclick="forcePullMissing()" style="background:linear-gradient(135deg,#00c853,#007a33);">⬇️ Force Pull Missing</button>
  <button class="btn btn-red" onclick="cleanCloud()">🧹 Clean Cloud Deleted</button>
  <button class="btn btn-sm" onclick="runFullCheck()" style="background:linear-gradient(135deg,#b537f2,#7a20b0);margin-left:auto;">📋 Re-scan Local</button>
  <span id="lastCheck" class="label" style="margin-left:8px;"></span>
</div>

<!-- File:// protocol-এ paste area -->
<div id="pasteSection" style="display:none;margin-bottom:16px;">
  <label>📋 Local Data Paste Area (file:// protocol-এ ব্যবহার করুন)</label>
  <textarea id="pasteData" placeholder='App এর Console থেকে copy(localStorage.getItem("wingsfly_data")) run করে এখানে paste করুন, তারপর Refresh All চাপুন'></textarea>
  <button class="btn btn-sm" onclick="runFullCheck()" style="margin-top:8px;">✅ Load Pasted Data</button>
</div>

<div class="grid">
  <!-- Local Data -->
  <div class="card" id="localCard">
    <h3>📱 Local Data</h3>
    <div id="localStats">Loading...</div>
  </div>

  <!-- Cloud Data -->
  <div class="card" id="cloudCard">
    <h3>☁️ Cloud Data</h3>
    <div id="cloudStats">Loading...</div>
  </div>

  <!-- Match Status -->
  <div class="card full" id="matchCard">
    <h3>⚖️ Comparison</h3>
    <div id="matchStats">Loading...</div>
  </div>

  <!-- Account Balances -->
  <div class="card full" id="accountsCard">
    <h3>💰 Account Balances</h3>
    <div id="accountStats">Loading...</div>
  </div>

  <!-- Cloud Duplicates -->
  <div class="card full hidden" id="dupCard">
    <h3>🚨 Cloud Duplicates</h3>
    <div id="dupStats"></div>
  </div>

  <!-- Stale Cloud Rows -->
  <div class="card full hidden" id="staleCard">
    <h3>⚠️ Stale Cloud Rows (in cloud but not local)</h3>
    <div id="staleStats"></div>
  </div>

  <!-- Log -->
  <div class="card full">
    <h3>📋 Log</h3>
    <div id="log"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const CFG = {
  URL: 'https://cwwyhtarnkozukekebvq.supabase.co',
  KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3d3lodGFybmtvenVrZWtlYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTE5NzUsImV4cCI6MjA4OTQyNzk3NX0.XCJe9A5_ymXQQqK5KVQHJqswUXCuopUi_NYv7T-WWn8',
  ACADEMY_ID: 'wingsfly_main',
  TABLE: 'academy_data',
  RECORD: 'wingsfly_main',
  TBL_STUDENTS: 'wf_students',
  TBL_FINANCE: 'wf_finance',
  TBL_EMPLOYEES: 'wf_employees'
};
const HDRS = {apikey:CFG.KEY, Authorization:'Bearer '+CFG.KEY};

function log(msg) {
  var el = document.getElementById('log');
  el.textContent += '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}
function fmt(n) { return '৳' + (parseFloat(n)||0).toLocaleString('en-IN'); }

// ═══════════════════════════════════════════════════════════
// LOCAL DATA — file:// protocol fix
// ═══════════════════════════════════════════════════════════
// সমস্যা: এই HTML file:// দিয়ে খোলা হয়, কিন্তু app চলে
// https://wings-fly-aviation-academy.web.app এ।
// দুটোর localStorage আলাদা — তাই সরাসরি read হয় না।
//
// সমাধান:
//   1) যদি এই monitor app-এর সাথে একই origin-এ খোলা হয় → সরাসরি পড়ো
//   2) যদি file:// হয় → user-কে data paste করতে বলো
//   3) অথবা user নিজে data import করুক (Export থেকে)

function getLocalData() {
  // চেষ্টা ১: সরাসরি localStorage (একই origin হলে কাজ করবে)
  try {
    var raw = localStorage.getItem('wingsfly_data');
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && (parsed.students || parsed.finance)) {
        log('✅ Local data found via localStorage (' + (parsed.students||[]).length + ' students)');
        return { source: 'localStorage', data: parsed };
      }
    }
  } catch(e) { log('localStorage read error: '+e.message); }

  // চেষ্টা ২: sessionStorage
  try {
    var raw2 = sessionStorage.getItem('wingsfly_data');
    if (raw2) {
      var p2 = JSON.parse(raw2);
      if (p2 && (p2.students || p2.finance)) {
        log('✅ Local data found via sessionStorage');
        return { source: 'sessionStorage', data: p2 };
      }
    }
  } catch(e) {}

  // চেষ্টা ৩: Paste area থেকে (file:// case)
  var pasteRaw = document.getElementById('pasteData')?.value?.trim();
  if (pasteRaw) {
    try {
      var p3 = JSON.parse(pasteRaw);
      if (p3 && (p3.students || p3.finance)) {
        log('✅ Local data loaded from paste area');
        return { source: 'paste', data: p3 };
      }
    } catch(e) { log('❌ Paste data JSON parse error: '+e.message); }
  }

  return null;
}

// ═══════════════════════════════════════════════════════════
// MAIN CHECK
// ═══════════════════════════════════════════════════════════
async function runFullCheck() {
  log('Starting full check...');
  document.getElementById('localStats').innerHTML = '<div class="dim">Loading...</div>';
  document.getElementById('cloudStats').innerHTML = '<div class="dim">Loading...</div>';
  document.getElementById('matchStats').innerHTML = '<div class="dim">Loading...</div>';

  var localResult = getLocalData();
  var gd = localResult ? localResult.data : null;

  // ── Local Stats ──
  if (gd) {
    document.getElementById('pasteSection').style.display = 'none';
    var lStu  = (gd.students||[]).length;
    var lFin  = (gd.finance||[]).filter(f=>!f._deleted).length;
    var lEmp  = (gd.employees||[]).length;
    var lVis  = (gd.visitors||[]).length;
    var lAct  = (gd.activityHistory||[]).length;
    var lBrk  = (gd.breakdownRecords||[]).length;
    var lNotc = (gd.notices||[]).length;
    var lKeep = 0;
    try { lKeep = JSON.parse(localStorage.getItem('wingsfly_keep_records')||'[]').length; } catch(e){}
    var lCash   = parseFloat(gd.cashBalance)||0;
    var lBank   = (gd.bankAccounts||[]).reduce((s,a)=>s+(parseFloat(a.balance)||0),0);
    var lMobile = (gd.mobileBanking||[]).reduce((s,a)=>s+(parseFloat(a.balance)||0),0);
    var lGrand  = lCash + lBank + lMobile;
    var lDelStu  = ((gd.deletedItems||{}).students||[]).length;
    var lDelFin  = ((gd.deletedItems||{}).finance||[]).length;
    var lDelEmp  = ((gd.deletedItems||{}).employees||[]).length;

    document.getElementById('localStats').innerHTML =
      srcBadge(localResult.source) +
      row('Students', lStu) +
      row('Finance (active)', lFin) +
      row('Employees', lEmp) +
      row('Visitors', lVis) +
      row('Activity History', lAct) +
      row('Keep Records', lKeep) +
      row('Breakdown Records', lBrk) +
      row('Notices', lNotc) +
      '<div style="margin:8px 0 4px;border-top:1px solid rgba(255,255,255,0.06);padding-top:8px;"></div>' +
      row('Recycle Bin — Students', lDelStu, lDelStu>0?'warn':'ok') +
      row('Recycle Bin — Finance', lDelFin,  lDelFin>0?'warn':'ok') +
      row('Recycle Bin — Employees', lDelEmp, lDelEmp>0?'warn':'ok') +
      '<div style="margin:8px 0 4px;border-top:1px solid rgba(255,255,255,0.06);padding-top:8px;"></div>' +
      row('Cash Balance', fmt(lCash)) +
      row('Bank Total', fmt(lBank)) +
      row('Mobile Total', fmt(lMobile)) +
      row('Grand Total', fmt(lGrand), lGrand>=0?'ok':'err') +
      row('Last Known Finance', localStorage.getItem('wings_last_known_finance')||'—') +
      row('Last Known Students', localStorage.getItem('wings_last_known_count')||'—');

    log('Local: '+lStu+' students, '+lFin+' finance, '+lEmp+' employees');
  } else {
    // file:// এ local data নেই — paste section দেখাও
    document.getElementById('pasteSection').style.display = 'block';
    document.getElementById('localStats').innerHTML =
      '<div class="err" style="margin-bottom:10px;">⚠️ Local data পাওয়া যাচ্ছে না</div>' +
      '<div class="dim" style="font-size:12px;line-height:1.6;">' +
      'এই monitor file:// protocol-এ খোলা। App-এর localStorage সরাসরি access করা যাচ্ছে না।<br><br>' +
      '<b style="color:var(--cyan)">সমাধান:</b><br>' +
      '① App খুলুন (wings-fly-aviation-academy.web.app)<br>' +
      '② Browser Console (F12) খুলুন<br>' +
      '③ এই command run করুন:<br>' +
      '<code style="background:#000;padding:4px 8px;border-radius:4px;display:block;margin:6px 0;color:#0f0;font-size:11px;">copy(localStorage.getItem('wingsfly_data'))</code>' +
      '④ নিচের box-এ Ctrl+V দিয়ে paste করুন<br>' +
      '⑤ Refresh All চাপুন' +
      '</div>';
    log('⚠️ No local data — file:// protocol limitation. Use paste area below.');
  }

  // ── Cloud Stats ──
  try {
    var [sRes, fRes, eRes] = await Promise.all([
      fetch(CFG.URL+'/rest/v1/'+CFG.TBL_STUDENTS+'?academy_id=eq.'+CFG.ACADEMY_ID+'&select=id,deleted', {headers:HDRS}),
      fetch(CFG.URL+'/rest/v1/'+CFG.TBL_FINANCE+'?academy_id=eq.'+CFG.ACADEMY_ID+'&select=id,deleted', {headers:HDRS}),
      fetch(CFG.URL+'/rest/v1/'+CFG.TBL_EMPLOYEES+'?academy_id=eq.'+CFG.ACADEMY_ID+'&select=id,deleted', {headers:HDRS})
    ]);
    var sCloud = await sRes.json();
    var fCloud = await fRes.json();
    var eCloud = await eRes.json();

    var cStuActive  = sCloud.filter(r=>!r.deleted).length;
    var cStuDeleted = sCloud.filter(r=>r.deleted).length;
    var cFinActive  = fCloud.filter(r=>!r.deleted).length;
    var cFinDeleted = fCloud.filter(r=>r.deleted).length;
    var cEmpActive  = eCloud.filter(r=>!r.deleted).length;
    var cEmpDeleted = eCloud.filter(r=>r.deleted).length;

    var mainRes = await fetch(CFG.URL+'/rest/v1/'+CFG.TABLE+'?id=eq.'+CFG.RECORD+
      '&select=visitors,activity_history,keep_records,breakdown_records,notices,activity_cleared_at', {headers:HDRS});
    var mainData = await mainRes.json();
    var cVisitors  = (mainData[0]?.visitors||[]).length;
    var cActivity  = (mainData[0]?.activity_history||[]).length;
    var cKeepRec   = (mainData[0]?.keep_records||[]).length;
    var cBreakdown = (mainData[0]?.breakdown_records||[]).length;
    var cNotices   = (mainData[0]?.notices||[]).length;
    var cCleared   = mainData[0]?.activity_cleared_at || null;

    document.getElementById('cloudStats').innerHTML =
      row('Students (active)', cStuActive) +
      row('Students (deleted)', cStuDeleted, cStuDeleted>0?'warn':'ok') +
      row('Finance (active)', cFinActive) +
      row('Finance (deleted)', cFinDeleted, cFinDeleted>0?'warn':'ok') +
      row('Employees (active)', cEmpActive) +
      row('Employees (deleted)', cEmpDeleted, cEmpDeleted>0?'warn':'ok') +
      row('Visitors (cloud)', cVisitors) +
      row('Activity History (cloud)', cActivity) +
      row('Keep Records (cloud)', cKeepRec) +
      row('Breakdown Records (cloud)', cBreakdown) +
      row('Notices (cloud)', cNotices) +
      (cCleared ? row('Activity Cleared At', new Date(cCleared).toLocaleString(), 'warn') : '') +
      row('Total Cloud Rows (Core)', sCloud.length+fCloud.length+eCloud.length);

    log('Cloud: '+cStuActive+'/'+cStuDeleted+' stu, '+cFinActive+'/'+cFinDeleted+' fin, '+cEmpActive+'/'+cEmpDeleted+' emp');

    // ── Match ──
    var lStu  = gd ? (gd.students||[]).length : 0;
    var lFin  = gd ? (gd.finance||[]).filter(f=>!f._deleted).length : 0;
    var lEmp  = gd ? (gd.employees||[]).length : 0;
    var lVis  = gd ? (gd.visitors||[]).length : 0;
    var lAct  = gd ? (gd.activityHistory||[]).length : 0;
    var lKeep2 = 0; try { lKeep2 = JSON.parse(localStorage.getItem('wingsfly_keep_records')||'[]').length; } catch(e){}
    var lBrk  = gd ? (gd.breakdownRecords||[]).length : 0;
    var lNotc = gd ? (gd.notices||[]).length : 0;

    var stuMatch  = lStu  === cStuActive;
    var finMatch  = lFin  === cFinActive;
    var empMatch  = lEmp  === cEmpActive;
    var visMatch  = lVis  === cVisitors;
    var keepMatch = lKeep2 === cKeepRec;
    var brkMatch  = lBrk  === cBreakdown;
    var notcMatch = lNotc === cNotices;
    var allMatch  = stuMatch && finMatch && empMatch;

    document.getElementById('matchCard').className = 'card full '+(allMatch?'match':'mismatch');
    document.getElementById('matchStats').innerHTML =
      row('Students',         lStu  +' local / '+cStuActive +' cloud', stuMatch ?'ok':'err') +
      row('Finance',          lFin  +' local / '+cFinActive +' cloud', finMatch ?'ok':'err') +
      row('Employees',        lEmp  +' local / '+cEmpActive +' cloud', empMatch ?'ok':'err') +
      row('Visitors',         lVis  +' local / '+cVisitors  +' cloud', visMatch ?'ok':'warn') +
      row('Keep Records',     lKeep2+' local / '+cKeepRec   +' cloud', keepMatch?'ok':'warn') +
      row('Breakdown Records',lBrk  +' local / '+cBreakdown +' cloud', brkMatch ?'ok':'warn') +
      row('Notices',          lNotc +' local / '+cNotices   +' cloud', notcMatch?'ok':'warn') +
      row('Status', allMatch?'✅ PERFECT MATCH':'❌ MISMATCH', allMatch?'ok':'err');

    if (cStuDeleted>0||cFinDeleted>0||cEmpDeleted>0)
      log('⚠️ Cloud deleted markers: stu='+cStuDeleted+' fin='+cFinDeleted+' emp='+cEmpDeleted);
    log(allMatch?'✅ All match!':'❌ Mismatch detected!');

  } catch(e) {
    document.getElementById('cloudStats').innerHTML = '<div class="err">Cloud error: '+e.message+'</div>';
    log('Cloud error: '+e.message);
  }

  // ── Accounts ──
  if (gd) {
    var html2 = '';
    html2 += row('💵 Cash', fmt(gd.cashBalance));
    (gd.bankAccounts||[]).forEach(a => { html2 += row('🏦 '+a.name, fmt(a.balance)); });
    (gd.mobileBanking||[]).forEach(a => { html2 += row('📱 '+a.name, fmt(a.balance)); });
    var grand2 = (parseFloat(gd.cashBalance)||0)
      + (gd.bankAccounts||[]).reduce((s,a)=>s+(parseFloat(a.balance)||0),0)
      + (gd.mobileBanking||[]).reduce((s,a)=>s+(parseFloat(a.balance)||0),0);
    html2 += row('📊 Grand Total', fmt(grand2), grand2>=0?'ok':'err');
    document.getElementById('accountStats').innerHTML = html2;
  } else {
    document.getElementById('accountStats').innerHTML = '<div class="dim">Local data নেই — Accounts দেখানো যাচ্ছে না</div>';
  }

  document.getElementById('lastCheck').textContent = 'Last: ' + new Date().toLocaleTimeString();
  log('Check complete.');
}

function srcBadge(src) {
  var color = src==='paste'?'#ff9800':src==='sessionStorage'?'#b537f2':'#00c853';
  return '<div style="font-size:11px;color:'+color+';margin-bottom:10px;font-weight:700;">📍 Source: '+src+'</div>';
}

function row(label, val, status) {
  var cls = status==='ok'?'ok':status==='warn'?'warn':status==='err'?'err':'';
  var badge = status ? '<span class="status s-'+status+'">'+status.toUpperCase()+'</span>' : '';
  return '<div class="row"><span class="label">'+label+'</span><span class="val '+cls+'">'+val+' '+badge+'</span></div>';
}

// ═══════════════════════════════════════════════════════════
// DEEP SCAN
// ═══════════════════════════════════════════════════════════
async function runDeepScan() {
  log('Running deep scan...');
  var localResult = getLocalData();
  var gd = localResult ? localResult.data : null;

  try {
    var fRes = await fetch(CFG.URL+'/rest/v1/'+CFG.TBL_FINANCE+'?academy_id=eq.'+CFG.ACADEMY_ID+'&select=id,data,deleted', {headers:HDRS});
    var fCloud = await fRes.json();

    var idMap = {};
    fCloud.forEach(r => {
      if (r.data && r.data.id) {
        var key = String(r.data.id);
        if (!idMap[key]) idMap[key] = [];
        idMap[key].push(r);
      }
    });
    var dups = Object.keys(idMap).filter(k => idMap[k].length > 1);

    document.getElementById('dupCard').className = 'card full '+(dups.length>0?'mismatch':'match');
    document.getElementById('dupCard').classList.remove('hidden');
    if (dups.length > 0) {
      var h = '<table><tr><th>ID</th><th>Cloud Rows</th><th>Action</th></tr>';
      dups.forEach(id => { h += '<tr><td>'+id+'</td><td class="err">'+idMap[id].length+'</td><td>Delete extra rows</td></tr>'; });
      h += '</table>';
      document.getElementById('dupStats').innerHTML = h;
      log('🚨 '+dups.length+' duplicate IDs found!');
    } else {
      document.getElementById('dupStats').innerHTML = '<div class="ok">✅ No duplicates found</div>';
      log('✅ No duplicates');
    }

    if (gd && gd.finance) {
      var localIds = new Set(gd.finance.map(f => String(f.id)));
      var stale = fCloud.filter(r => r.data && !localIds.has(String(r.data.id)) && !r.deleted);
      document.getElementById('staleCard').className = 'card full '+(stale.length>0?'mismatch':'match');
      document.getElementById('staleCard').classList.remove('hidden');
      if (stale.length > 0) {
        var h2 = '<table><tr><th>Cloud ID</th><th>Type</th><th>Amount</th><th>Person</th><th>Date</th></tr>';
        stale.forEach(r => { var d=r.data; h2 += '<tr><td>'+d.id+'</td><td>'+d.type+'</td><td>'+fmt(d.amount)+'</td><td>'+(d.person||'—')+'</td><td>'+(d.date||'—')+'</td></tr>'; });
        h2 += '</table>';
        document.getElementById('staleStats').innerHTML = h2;
        log('⚠️ '+stale.length+' stale cloud rows');
      } else {
        document.getElementById('staleStats').innerHTML = '<div class="ok">✅ No stale rows</div>';
        log('✅ No stale rows');
      }
    } else {
      document.getElementById('staleStats').innerHTML = '<div class="dim">Local data নেই — stale check সম্ভব নয়</div>';
    }
  } catch(e) { log('Deep scan error: '+e.message); }
}

// ═══════════════════════════════════════════════════════════
// CLEAN CLOUD DELETED
// ═══════════════════════════════════════════════════════════
async function cleanCloud() {
  if (!confirm('Cloud থেকে সব deleted=true rows ডিলিট করবেন?')) return;
  log('Cleaning cloud deleted markers...');
  try {
    var r1 = await fetch(CFG.URL+'/rest/v1/'+CFG.TBL_FINANCE+'?academy_id=eq.'+CFG.ACADEMY_ID+'&deleted=eq.true', {method:'DELETE',headers:HDRS});
    log('Finance deleted: HTTP '+r1.status);
    var r2 = await fetch(CFG.URL+'/rest/v1/'+CFG.TBL_STUDENTS+'?academy_id=eq.'+CFG.ACADEMY_ID+'&deleted=eq.true', {method:'DELETE',headers:HDRS});
    log('Students deleted: HTTP '+r2.status);
    var r3 = await fetch(CFG.URL+'/rest/v1/'+CFG.TBL_EMPLOYEES+'?academy_id=eq.'+CFG.ACADEMY_ID+'&deleted=eq.true', {method:'DELETE',headers:HDRS});
    log('Employees deleted: HTTP '+r3.status);
    log('✅ Cloud cleaned!');
    runFullCheck();
  } catch(e) { log('Clean error: '+e.message); }
}

// ═══════════════════════════════════════════════════════════
// FORCE PULL MISSING
// ═══════════════════════════════════════════════════════════
async function forcePullMissing() {
  log('⬇️ Force pulling missing records...');
  var localResult = getLocalData();
  var gd = localResult ? localResult.data : null;
  if (!gd) { log('❌ No local data!'); return; }

  try {
    var fRes = await fetch(CFG.URL+'/rest/v1/'+CFG.TBL_FINANCE+'?academy_id=eq.'+CFG.ACADEMY_ID+'&deleted=eq.false&select=id,data', {headers:HDRS});
    if (!fRes.ok) { log('❌ Cloud fetch failed: HTTP '+fRes.status); return; }
    var fCloud = await fRes.json();
    log('☁️ Cloud active finance: '+fCloud.length);

    if (!gd.finance) gd.finance = [];
    var localIds = new Set(gd.finance.map(f => String(f.id)));
    var missing = fCloud.filter(r => r.data && r.data.id && !localIds.has(String(r.data.id)));

    if (missing.length === 0) { log('✅ কোনো মিসিং রেকর্ড নেই!'); alert('✅ Local এবং Cloud সমান।'); return; }

    log('⚠️ '+missing.length+'টি মিসিং');
    missing.forEach(r => { var d=r.data; log('  ➕ '+(d.type||'?')+' | '+fmt(d.amount)+' | '+(d.person||'—')+' | '+(d.date||'—')); });

    if (!confirm(missing.length+'টি মিসিং Finance রেকর্ড পাওয়া গেছে।\nLocal Data-তে যোগ করবেন?')) { log('Cancelled.'); return; }

    missing.forEach(r => { gd.finance.push(r.data); });
    try {
      localStorage.setItem('wingsfly_data', JSON.stringify(gd));
      log('✅ '+missing.length+'টি রেকর্ড যোগ হয়েছে! App-এ Ctrl+Shift+R দিন।');
      alert('✅ '+missing.length+'টি রেকর্ড যোগ হয়েছে!\n\nApp-এ ফিরে Ctrl+Shift+R করুন।');
      runFullCheck();
    } catch(e) { log('❌ Save failed: '+e.message); }
  } catch(e) { log('❌ Error: '+e.message); }
}

// Auto-run
runFullCheck();
</script>
