<div class="modal fade" id="noticeBoardModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content notice-modal-content">
            <div class="modal-header notice-modal-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="notice-modal-icon">
                        <i class="bi bi-megaphone-fill fs-4"></i>
                    </div>
                    <div>
                        <h5 class="modal-title mb-0 fw-bold">📋 নোটিস বোর্ড ম্যানেজার</h5>
                        <small class="opacity-75">নোটিস তৈরি করুন ও মেয়াদ নির্ধারণ করুন</small>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white"
                    data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">

                <!-- Current Notice Status -->
                <div id="currentNoticeStatus" class="notice-status-card mb-4" style="display:none;">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="notice-status-title">
                                <i class="bi bi-broadcast-pin text-warning me-2"></i>
                                সক্রিয় নোটিস
                            </div>
                            <p class="notice-status-text mt-2 mb-1" id="currentNoticeText">—</p>
                            <small class="notice-status-expire" id="currentNoticeExpire">—</small>
                        </div>
                        <button class="btn btn-sm btn-danger rounded-pill px-3"
                            onclick="deleteNotice()">
                            <i class="bi bi-trash3-fill me-1"></i> মুছুন
                        </button>
                    </div>
                </div>

                <!-- No Active Notice -->
                <div id="noActiveNoticeMsg" class="text-center py-3 mb-3">
                    <i class="bi bi-megaphone fs-1 text-muted opacity-50 d-block mb-2"></i>
                    <p class="text-muted">কোনো সক্রিয় নোটিস নেই</p>
                </div>

                <hr class="border-secondary opacity-25">

                <!-- New Notice Form -->
                <h6 class="fw-bold mb-3 text-av-main">
                    <i class="bi bi-plus-circle-fill text-success me-2"></i>নতুন নোটিস তৈরি করুন
                </h6>

                <div class="mb-3">
                    <label class="form-label fw-semibold">নোটিসের বিষয়বস্তু <span
                            class="text-danger">*</span></label>
                    <textarea id="noticeTextInput" class="form-control notice-textarea" rows="3"
                        placeholder="যেমন: আজ অফিস বন্ধ থাকবে। সকল কার্যক্রম স্থগিত আছে। পরবর্তী নির্দেশ না আসা পর্যন্ত অপেক্ষা করুন।"
                        maxlength="300"></textarea>
                    <small class="text-muted"><span id="noticeCharCount">0</span>/300 অক্ষর</small>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">নোটিসের ধরন</label>
                        <select id="noticeTypeSelect" class="form-select">
                            <option value="warning">⚠️ সতর্কতা (হলুদ)</option>
                            <option value="info">ℹ️ তথ্য (নীল)</option>
                            <option value="danger">🚨 জরুরি (লাল)</option>
                            <option value="success">✅ সফলতা (সবুজ)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">মেয়াদ নির্ধারণ করুন</label>
                        <select id="noticeDurationSelect" class="form-select"
                            onchange="toggleCustomDuration()">
                            <option value="30">৩০ মিনিট</option>
                            <option value="60">১ ঘণ্টা</option>
                            <option value="120">২ ঘণ্টা</option>
                            <option value="360">৬ ঘণ্টা</option>
                            <option value="720" selected>১২ ঘণ্টা</option>
                            <option value="1440">১ দিন</option>
                            <option value="2880">২ দিন</option>
                            <option value="4320">৩ দিন</option>
                            <option value="10080">১ সপ্তাহ</option>
                            <option value="custom">কাস্টম সময় নির্ধারণ করুন</option>
                        </select>
                    </div>
                </div>

                <!-- Custom Duration (hidden by default) -->
                <div id="customDurationRow" class="row g-3 mb-3" style="display:none !important;">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">দিন</label>
                        <input type="number" id="customDays" class="form-control" min="0" max="30"
                            value="0" placeholder="০">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">ঘণ্টা</label>
                        <input type="number" id="customHours" class="form-control" min="0" max="23"
                            value="0" placeholder="০">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">মিনিট</label>
                        <input type="number" id="customMinutes" class="form-control" min="0" max="59"
                            value="30" placeholder="৩০">
                    </div>
                </div>

                <!-- Preview -->
                <div id="noticePreviewArea" class="notice-preview-area mb-3" style="display:none;">
                    <small class="text-muted d-block mb-2 fw-semibold">প্রিভিউ:</small>
                    <div id="noticePreviewBanner" class="notice-preview-banner">
                        <i class="bi bi-megaphone-fill me-2"></i>
                        <span id="noticePreviewText"></span>
                    </div>
                </div>

            </div>
            <div class="modal-footer border-0 pt-0 px-4 pb-4 gap-2">
                <button type="button" class="btn btn-secondary rounded-pill px-4"
                    data-bs-dismiss="modal">
                    বাতিল
                </button>
                <button type="button" class="btn btn-outline-info rounded-pill px-4"
                    onclick="previewNotice()">
                    <i class="bi bi-eye me-1"></i> প্রিভিউ
                </button>
                <button type="button" class="btn btn-success rounded-pill px-4 fw-bold"
                    onclick="publishNotice()">
                    <i class="bi bi-megaphone-fill me-1"></i> নোটিস প্রকাশ করুন
                </button>
            </div>
        </div>
    </div>
</div>
