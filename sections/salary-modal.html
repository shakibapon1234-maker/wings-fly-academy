<div class="modal fade" id="salaryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-header border-bottom">
                <h5 class="modal-title fw-bold">💰 Record Salary Payment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="salaryForm" onsubmit="handleSalarySubmit(event)">
                    <input type="hidden" id="salEmpId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Staff Member</label>
                        <input type="text" id="salEmpName" class="form-control" readonly>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Amount (৳) <span class="text-danger">*</span></label>
                            <input type="number" id="salAmount" class="form-control" required placeholder="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Payment Type</label>
                            <select id="salType" class="form-select">
                                <option value="Salary" selected>Monthly Salary</option>
                                <option value="Bonus">Bonus</option>
                                <option value="Advance">Advance Salary</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Payment Method <span class="text-danger">*</span></label>
                            <select id="salMethod" class="form-select" required>
                                <option value="Cash">Cash</option>
                                <option value="Bkash">Bkash</option>
                                <option value="Nagad">Nagad</option>
                                <option value="Bank">Bank Transfer</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Payment Date</label>
                            <input type="date" id="salDate" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description / Notes</label>
                        <textarea id="salDescription" class="form-control" rows="2" placeholder="e.g. Salary for March 2026"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="salaryForm" class="btn btn-success fw-bold px-4">💾 Confirm Payment</button>
            </div>
        </div>
    </div>
</div>
