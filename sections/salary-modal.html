<div class="modal fade" id="salaryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:520px;">
        <div class="modal-content custom-modal">
            <div class="modal-header border-bottom">
                <h5 class="modal-title fw-bold" id="salModalTitle">💰 Record Salary Payment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pb-2">
                <form id="salaryForm" onsubmit="handleSalarySubmit(event)">
                    <input type="hidden" id="salEmpId">
                    <input type="hidden" id="salEmpName">
                    <input type="hidden" id="salTypeHidden" value="Due">

                    <!-- Staff Member Dropdown -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Staff Member <span class="text-danger">*</span></label>
                        <select id="salEmpSelect" class="form-select" required>
                            <option value="">-- Select Staff --</option>
                        </select>
                    </div>

                    <!-- ══════════════════════════════════════ -->
                    <!-- TYPE SELECTOR — 3 Big Buttons         -->
                    <!-- ══════════════════════════════════════ -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Payment Type <span class="text-danger">*</span></label>
                        <div class="d-flex gap-2" id="salTypeButtons">

                            <button type="button" id="btnTypeDue"
                                class="sal-type-btn flex-fill py-2 rounded-3 fw-bold border-0"
                                onclick="setSalType('Due')"
                                style="background:linear-gradient(135deg,#00d4aa,#00a88a);color:#fff;box-shadow:0 3px 12px rgba(0,212,170,0.4);">
                                🟢 Due
                                <div class="small fw-normal" style="font-size:0.72rem;opacity:0.85;">বকেয়া পেমেন্ট</div>
                            </button>

                            <button type="button" id="btnTypeAdvance"
                                class="sal-type-btn flex-fill py-2 rounded-3 fw-bold"
                                onclick="setSalType('Advance')"
                                style="background:rgba(255,255,255,0.07);color:#a0c4ff;border:1px solid rgba(255,255,255,0.12);">
                                🔵 Advance
                                <div class="small fw-normal" style="font-size:0.72rem;opacity:0.75;">অগ্রিম পেমেন্ট</div>
                            </button>

                            <button type="button" id="btnTypeBonus"
                                class="sal-type-btn flex-fill py-2 rounded-3 fw-bold"
                                onclick="setSalType('Bonus')"
                                style="background:rgba(255,255,255,0.07);color:#a0c4ff;border:1px solid rgba(255,255,255,0.12);">
                                🌟 Bonus
                                <div class="small fw-normal" style="font-size:0.72rem;opacity:0.75;">বোনাস</div>
                            </button>

                        </div>
                    </div>

                    <!-- ── DUE info panel ── -->
                    <div id="salDuePanel" class="py-2 px-3 mb-3 rounded-3"
                        style="background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);font-size:0.84rem;">
                        <div class="d-flex justify-content-between align-items-center">
                            <span style="color:#a0ffdd;"><i class="bi bi-calendar-check me-1"></i>এই মাসের বকেয়া</span>
                            <span id="salDueAmountBadge" class="fw-bold" style="color:#00d4aa;font-size:1rem;">৳ —</span>
                        </div>
                        <div class="mt-1" style="color:#7af0d0;font-size:0.77rem;opacity:0.8;">
                            বকেয়া পরিমাণ অটো-ফিল হয়েছে। কম দিলে Partial হবে।
                        </div>
                    </div>

                    <!-- ── ADVANCE info panel ── -->
                    <div id="salAdvancePanel" class="py-2 px-3 mb-3 rounded-3 d-none"
                        style="background:rgba(0,150,255,0.1);border:1px solid rgba(0,150,255,0.3);font-size:0.84rem;">
                        <div style="color:#7ab8ff;">
                            <i class="bi bi-info-circle me-1"></i>
                            Advance → <strong>Accounts › Advance Management</strong>-এ রেকর্ড হবে। পরে সেখান থেকে adjust করা যাবে।
                        </div>
                        <div id="salExistingAdvance" class="mt-1 fw-bold d-none" style="color:#ff9f43;font-size:0.82rem;"></div>
                    </div>

                    <!-- ── BONUS info panel ── -->
                    <div id="salBonusPanel" class="py-2 px-3 mb-3 rounded-3 d-none"
                        style="background:rgba(255,200,0,0.1);border:1px solid rgba(255,200,0,0.3);font-size:0.84rem;">
                        <span style="color:#ffd200;"><i class="bi bi-star-fill me-1"></i>
                            Bonus সরাসরি Salary Expense হিসেবে রেকর্ড হবে।
                        </span>
                    </div>

                    <!-- Amount + Date -->
                    <div class="row g-3 mb-3">
                        <div class="col-7">
                            <label class="form-label fw-bold">Amount (৳) <span class="text-danger">*</span></label>
                            <input type="number" id="salAmount" class="form-control" required placeholder="0" min="1">
                        </div>
                        <div class="col-5">
                            <label class="form-label fw-bold">Payment Date <span class="text-danger">*</span></label>
                            <input type="date" id="salDate" class="form-control" required>
                        </div>
                    </div>

                    <!-- Payment Method -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Payment Method <span class="text-danger">*</span></label>
                        <select id="salMethod" class="form-select" required>
                            <option value="Cash">💵 Cash</option>
                        </select>
                    </div>

                    <!-- Description -->
                    <div class="mb-1">
                        <label class="form-label fw-bold">Description / Notes</label>
                        <textarea id="salDescription" class="form-control" rows="2"
                            placeholder="e.g. Salary for March 2026"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top pt-2">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="salaryForm" id="salConfirmBtn"
                    class="btn btn-success fw-bold px-4">💾 Confirm Payment</button>
            </div>
        </div>
    </div>
</div>

<style>
.sal-type-btn {
    cursor: pointer;
    transition: all 0.2s ease;
    line-height: 1.3;
}
.sal-type-btn:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
}
</style>

<script>
// ═══════════════════════════════════════════════════════
// SALARY MODAL — TYPE SWITCHER
// ═══════════════════════════════════════════════════════

function setSalType(type) {
    document.getElementById('salTypeHidden').value = type;

    const styles = {
        Due:     { bg:'linear-gradient(135deg,#00d4aa,#00a88a)', color:'#fff',    shadow:'0 3px 12px rgba(0,212,170,0.4)', border:'none' },
        Advance: { bg:'linear-gradient(135deg,#0096ff,#0055cc)', color:'#fff',    shadow:'0 3px 12px rgba(0,150,255,0.4)', border:'none' },
        Bonus:   { bg:'linear-gradient(135deg,#ffd200,#ff9f43)', color:'#1a1000', shadow:'0 3px 12px rgba(255,200,0,0.4)',  border:'none' },
    };
    const inactive = { bg:'rgba(255,255,255,0.07)', color:'#a0c4ff', shadow:'none', border:'1px solid rgba(255,255,255,0.12)' };

    ['Due','Advance','Bonus'].forEach(t => {
        const btn = document.getElementById('btnType' + t);
        if (!btn) return;
        const s = (t === type) ? styles[t] : inactive;
        btn.style.background  = s.bg;
        btn.style.color       = s.color;
        btn.style.boxShadow   = s.shadow;
        btn.style.border      = s.border;
    });

    // Panels
    ['Due','Advance','Bonus'].forEach(t => {
        const el = document.getElementById('sal' + t + 'Panel');
        if (el) el.classList.toggle('d-none', t !== type);
    });

    // Confirm button style
    const confirmBtn = document.getElementById('salConfirmBtn');
    const btnLabels  = { Due:'💾 Pay Due Salary', Advance:'🔵 Save Advance', Bonus:'🌟 Save Bonus' };
    confirmBtn.textContent = btnLabels[type];
    if (type === 'Advance') {
        confirmBtn.style.cssText = 'background:linear-gradient(135deg,#0096ff,#0055cc);color:#fff;border:none;font-weight:700;padding:.5rem 1.5rem;';
    } else if (type === 'Bonus') {
        confirmBtn.style.cssText = 'background:linear-gradient(135deg,#ffd200,#ff9f43);color:#1a1000;border:none;font-weight:700;padding:.5rem 1.5rem;';
    } else {
        confirmBtn.style.cssText = '';
        confirmBtn.className = 'btn btn-success fw-bold px-4';
    }

    // Modal title
    const titles = { Due:'💰 Pay Due Salary', Advance:'🔵 Record Advance', Bonus:'🌟 Record Bonus' };
    document.getElementById('salModalTitle').textContent = titles[type];

    // Auto description
    const month = document.getElementById('salaryMonthFilter')?.value;
    const desc  = document.getElementById('salDescription');
    if (desc && month) desc.value = `${type} for ${month}`;

    // Amount
    const amountEl = document.getElementById('salAmount');
    if (type === 'Due') {
        // Pull due value from badge set by salary-management.js
        const badgeText = document.getElementById('salDueAmountBadge')?.textContent || '';
        const dueNum = parseFloat(badgeText.replace(/[৳,\s]/g,'').replace(/[^\d.]/g,'')) || 0;
        amountEl.value = dueNum > 0 ? dueNum : '';
        amountEl.placeholder = 'বকেয়া পরিমাণ';
    } else {
        amountEl.value = '';
        amountEl.placeholder = type === 'Advance' ? 'Advance পরিমাণ' : 'Bonus পরিমাণ';
    }
}
</script>
